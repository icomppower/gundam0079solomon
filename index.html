<style>

    --amber:#f5c46b; --amber-glow:rgba(245,196,107,.55);
    --blue:#86b9ff; --blue-glow:rgba(134,185,255,.55);

<!-- Three.js r128, single script from cdnjs (no bundler, no build step) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* ============================================================================
 * 所羅門攻略戰 · BATTLE OF SOLOMON · U.C. 0079
 * Single-file 3D space documentary — built on icomppower/space-engine.
 * ----------------------------------------------------------------------------
 * Real star sphere · nebula · sun · distant Earth/Luna backdrop · Solomon
 * asteroid fortress as scene origin [0,0,0]. A SCENES[] player auto-plays 10
 * acts: per-scene camera tween (2.4s) + hold, multi-unit keyframe tracks,
 * st:dead vaporise FX, Solar System beam, faction colours + emblems, CC chips.
 * No external assets · no build step · no 2D map · no timeline scrubber.
 * ==========================================================================*/

/* ---------------------------------------------------------------- CFG ----- */
const CFG = {
  starCount : 9000,
  starShell : [6200, 9600],
  sunDir    : [1.0, 0.34, 0.55],
  // distant backdrop (dim, small, never steals the frame — battle is the subject)
  earthPos  : [-1700, -260, -2500], earthSize: 80,
  moonPos   : [-2050, -120, -2750], moonSize : 24,
};

/* ----------------------------------------- factions (colour + emblem) ----- */
const FACTION = {
  eff:  { hull:0x8c98a8, light:0x9fd0ff, core:0x9fd0ff, emblem:'EFF'  }, // 聯邦 — 冷藍鋼
  zeon: { hull:0x6b6258, light:0xffb63c, core:0xffc861, emblem:'ZEON' }, // 吉翁 — 暖綠／金
};
function rgbStr(hex){ const c=new THREE.Color(hex); return `${(c.r*255)|0},${(c.g*255)|0},${(c.b*255)|0}`; }
for(const k in FACTION){ FACTION[k].ls = rgbStr(FACTION[k].light); FACTION[k].hs = rgbStr(FACTION[k].hull); }

/* --------------------------------------------------------- tiny utils ----- */
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
// radial-gradient sprite from a fresh canvas (one-offs: sun, nebula, fortress core)
function radialSprite(stops, size, opacity){
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(128,128,0, 128,128,128);
  stops.forEach(([o, col]) => g.addColorStop(o, col));
  ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity,
    blending: THREE.AdditiveBlending, depthWrite: false });
  const sp = new THREE.Sprite(mat); sp.scale.set(size, size, 1);
  return sp;
}
// cached radial textures (re-used every frame for trails / explosions / engine glow)
const _texCache = {};
function glowTex(key, stops){
  if(_texCache[key]) return _texCache[key];
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64,64,0, 64,64,64);
  stops.forEach(([o,col]) => g.addColorStop(o,col));
  ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
  const tex = new THREE.CanvasTexture(c); tex._shared = true; _texCache[key] = tex;
  return tex;
}
function makeSprite(tex, size, opacity){
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity,
    blending: THREE.AdditiveBlending, depthWrite: false });
  const sp = new THREE.Sprite(mat); sp.scale.set(size, size, 1);
  return sp;
}

/* ========================================================== 1 · RENDERER == */
const sceneEl = document.getElementById('scene');
const scene   = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setClearColor(0x000308, 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
sceneEl.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(46, window.innerWidth/window.innerHeight, 1, 40000);
const sunDir = new THREE.Vector3(...CFG.sunDir).normalize();

/* ========================================================= 2 · STAR FIELD = */
function buildStars(){
  const n = CFG.starCount, [inner, outer] = CFG.starShell;
  const pos=new Float32Array(n*3), col=new Float32Array(n*3),
        size=new Float32Array(n), phase=new Float32Array(n);
  const rnd = mulberry32(90791), c = new THREE.Color();
  for(let i=0;i<n;i++){
    const u = rnd()*2-1, th = rnd()*Math.PI*2, s = Math.sqrt(1-u*u);
    const r = inner + rnd()*(outer-inner);
    pos[i*3]=r*s*Math.cos(th); pos[i*3+1]=r*u; pos[i*3+2]=r*s*Math.sin(th);
    const t = rnd();
    const hue = t<0.12 ? 0.58 : (t>0.90 ? 0.07 : 0.6);
    const sat = t<0.12||t>0.90 ? 0.5 : 0.06;
    c.setHSL(hue, sat, 0.55 + rnd()*0.45);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
    size[i]=(rnd()*rnd())*7+1.4; phase[i]=rnd();
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(size,1));
  geo.setAttribute('aPhase',   new THREE.BufferAttribute(phase,1));
  const mat = new THREE.ShaderMaterial({
    uniforms:{ uTime:{value:0}, uPix:{value:renderer.getPixelRatio()} },
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, vertexColors:true,
    vertexShader:`attribute float aSize; attribute float aPhase; varying vec3 vColor;
      uniform float uTime; uniform float uPix;
      void main(){ vColor=color;
        float tw=0.65+0.35*sin(uTime*1.7+aPhase*6.2831853);
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=aSize*tw*uPix*(340.0/-mv.z);
        gl_Position=projectionMatrix*mv; }`,
    fragmentShader:`varying vec3 vColor;
      void main(){ float d=length(gl_PointCoord-vec2(0.5));
        float a=smoothstep(0.5,0.0,d); gl_FragColor=vec4(vColor,a*a); }`,
  });
  const stars = new THREE.Points(geo, mat); stars.frustumCulled = false;
  scene.add(stars); return mat;
}
const starMat = buildStars();

/* ============================================================ 3 · NEBULA == */
(function(){
  const neb = new THREE.Group();
  [ { col:'rgba(60,90,200,',  pos:[-1800,600,-3200], size:5200, op:0.10 },
    { col:'rgba(170,60,150,', pos:[2400,-900,-2600], size:4200, op:0.08 },
    { col:'rgba(40,140,170,', pos:[-800,-1400,2800], size:4600, op:0.07 },
  ].forEach(c=>{ const sp=radialSprite([[0,c.col+'1)'],[0.5,c.col+'0.25)'],[1,c.col+'0)']],c.size,c.op);
    sp.position.set(...c.pos); neb.add(sp); });
  scene.add(neb);
})();

/* =============================================================== 4 · SUN == */
const sunLight = new THREE.DirectionalLight(0xfff2dd, 2.2);
sunLight.position.copy(sunDir).multiplyScalar(4000); scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x223044, 0.6));
(function(){
  const g = new THREE.Group(); g.position.copy(sunDir.clone().multiplyScalar(7000));
  g.add(new THREE.Mesh(new THREE.SphereGeometry(120,24,24), new THREE.MeshBasicMaterial({color:0xfff6e6})));
  g.add(radialSprite([[0,'rgba(255,250,235,1)'],[0.25,'rgba(255,225,160,0.7)'],[1,'rgba(255,180,90,0)']],2600,0.9));
  scene.add(g);
})();

/* ============================================ 5 · distant Earth / Luna ===== */
function earthTexture(seed){
  const W=1024,H=512,c=document.createElement('canvas'); c.width=W;c.height=H;
  const ctx=c.getContext('2d'), rnd=mulberry32(seed);
  const og=ctx.createLinearGradient(0,0,0,H);
  og.addColorStop(0,'#0a2236'); og.addColorStop(0.5,'#0e3a5c'); og.addColorStop(1,'#0a2236');
  ctx.fillStyle=og; ctx.fillRect(0,0,W,H);
  const land=['#2f6b3a','#3c7a44','#6b7a3c','#8a7a4e','#4a6b3a'];
  for(let k=0;k<10;k++){
    const cx=rnd()*W, cy=H*0.18+rnd()*H*0.64, blobs=30+(rnd()*40|0);
    for(let b=0;b<blobs;b++){
      const ang=rnd()*Math.PI*2, dist=Math.pow(rnd(),0.6)*(70+rnd()*120);
      const x=cx+Math.cos(ang)*dist, y=cy+Math.sin(ang)*dist*0.6, r=14+rnd()*46;
      const col=land[(rnd()*land.length)|0], g=ctx.createRadialGradient(x,y,0,x,y,r);
      g.addColorStop(0,col); g.addColorStop(0.7,col); g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.fillStyle=g; ctx.globalAlpha=0.85; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
    }
  }
  ctx.globalAlpha=1; return new THREE.CanvasTexture(c);
}
const earth = new THREE.Group();
earth.add(new THREE.Mesh(new THREE.SphereGeometry(CFG.earthSize,48,36),
  new THREE.MeshPhongMaterial({ map:earthTexture(1337), shininess:6, specular:0x10283c })));
earth.add(new THREE.Mesh(new THREE.SphereGeometry(CFG.earthSize*1.06,48,36),
  new THREE.MeshBasicMaterial({ color:0x183a64, transparent:true, opacity:0.25,
    blending:THREE.AdditiveBlending, depthWrite:false, side:THREE.BackSide })));
earth.position.set(...CFG.earthPos); scene.add(earth);
(function(){
  const m=new THREE.Mesh(new THREE.SphereGeometry(CFG.moonSize,32,24),
    new THREE.MeshPhongMaterial({color:0x8f8f88, shininess:2}));
  m.position.set(...CFG.moonPos); scene.add(m);
})();

/* ============================================== 6 · buildFortress() factory ==
 * Solomon = displaced octahedron asteroid + gold trench lights + reactor core.
 * Core mesh is tagged 'reactorCore' so S10 can swap Zeon→EFF on capture.       */
function buildFortress({ size, elongate=1, seed=7, color=0x8f8265, emissive=0x1c160c, coreColor=0xffc861 }){
  const group = new THREE.Group(), rnd = mulberry32(seed);
  const geo = new THREE.OctahedronGeometry(size,3), p = geo.attributes.position, v = new THREE.Vector3();
  for(let i=0;i<p.count;i++){ v.fromBufferAttribute(p,i); v.multiplyScalar(0.72+rnd()*0.6); v.y*=elongate; p.setXYZ(i,v.x,v.y,v.z); }
  geo.computeVertexNormals();
  group.add(new THREE.Mesh(geo, new THREE.MeshStandardMaterial({
    color, emissive, emissiveIntensity:0.4, roughness:0.95, metalness:0.08, flatShading:true })));
  const nL=90, lp=new Float32Array(nL*3);
  for(let i=0;i<nL;i++){ const idx=(rnd()*p.count)|0; v.fromBufferAttribute(p,idx).multiplyScalar(1.02); lp[i*3]=v.x;lp[i*3+1]=v.y;lp[i*3+2]=v.z; }
  const lgeo=new THREE.BufferGeometry(); lgeo.setAttribute('position', new THREE.BufferAttribute(lp,3));
  group.add(new THREE.Points(lgeo, new THREE.PointsMaterial({ color:0xffd27a, size:Math.max(0.6,size*0.07),
    transparent:true, opacity:0.95, blending:THREE.AdditiveBlending, depthWrite:false })));
  const core = new THREE.Mesh(new THREE.SphereGeometry(size*0.16,16,16), new THREE.MeshBasicMaterial({color:coreColor}));
  core.name='reactorCore'; group.add(core);
  const glow = radialSprite([[0,`rgba(${rgbStr(coreColor)},1)`],[0.4,`rgba(${rgbStr(coreColor)},0.5)`],[1,`rgba(${rgbStr(coreColor)},0)`]], size*4.2, 0.85);
  glow.name='coreGlow'; group.add(glow);
  return group;
}

/* ====================================================== 7 · unit builders == */
function shipMesh(F, scale){
  const g = new THREE.Group();
  const hull = new THREE.Mesh(new THREE.ConeGeometry(1.3*scale, 5*scale, 8),
    new THREE.MeshStandardMaterial({ color:F.hull, roughness:0.45, metalness:0.65,
      emissive:F.hull, emissiveIntensity:0.06 }));
  hull.rotation.x = Math.PI/2;          // point along +Z (travel direction)
  g.add(hull);
  const glow = makeSprite(glowTex('engine-'+F.emblem, [[0,`rgba(${F.ls},1)`],[1,`rgba(${F.ls},0)`]]), 5.5*scale, 0.85);
  glow.position.set(0,0,-3*scale); g.add(glow);
  return g;
}
function buildFleet(F, count, scale){
  const g = new THREE.Group(), rnd = mulberry32(count*131 + (F.hull&0xff));
  for(let i=0;i<count;i++){
    const s = shipMesh(F, scale);
    s.position.set((rnd()-0.5)*18*scale, (rnd()-0.5)*7*scale, (rnd()-0.5)*18*scale);
    s.rotation.y = (rnd()-0.5)*0.5;
    g.add(s);
  }
  return g;
}
function emblemSprite(F){
  const c=document.createElement('canvas'); c.width=c.height=128; const ctx=c.getContext('2d');
  ctx.clearRect(0,0,128,128);
  const col = F.emblem==='EFF' ? '#9fd0ff' : '#ffb63c';
  ctx.strokeStyle=col; ctx.lineWidth=6; ctx.beginPath(); ctx.arc(64,64,40,0,Math.PI*2); ctx.stroke();
  ctx.fillStyle=col; ctx.font='bold 30px monospace'; ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(F.emblem, 64, 66);
  const tex=new THREE.CanvasTexture(c);
  const sp=new THREE.Sprite(new THREE.SpriteMaterial({map:tex,transparent:true,opacity:0.95,depthWrite:false}));
  sp.scale.set(9,9,1); sp.name='emblem'; return sp;
}
function buildSolarArray(){
  const g = new THREE.Group();
  const panelMat = new THREE.MeshStandardMaterial({ color:0x6a7a8c, roughness:0.3, metalness:0.85,
    side:THREE.DoubleSide, emissive:0x14304a, emissiveIntensity:0.3 });
  for(let i=0;i<5;i++){
    const p = new THREE.Mesh(new THREE.PlaneGeometry(20,13), panelMat);
    p.position.set((i-2)*15, (i%2)*5-2, 0); p.rotation.set(0,-0.4,0.06);
    g.add(p);
  }
  const core = makeSprite(glowTex('solar', [[0,'rgba(190,235,255,1)'],[0.4,'rgba(120,190,255,0.5)'],[1,'rgba(120,190,255,0)']]), 46, 0.0);
  core.name='charge'; g.add(core);
  g.userData.solar = true;
  return g;
}
function buildUnit(u){
  const F = FACTION[u.faction];
  switch(u.kind){
    case 'fortress': {
      const f = buildFortress({ size:40, elongate:1.15, seed:7,
        color:F.hull, coreColor:F.core });
      return f;
    }
    case 'fleet':   return buildFleet(F, 6, 1);
    case 'command': { const c = buildFleet(F, 1, 2.4); c.add(emblemSprite(F)); return c; }
    case 'ms':      return shipMesh(F, 0.85);
    case 'hero-ms': { const m = shipMesh(F, 1.15); m.userData.hero = true; return m; }
    case 'artillery': return buildSolarArray();
  }
  return new THREE.Group();
}

/* ============================================================ 8 · SCENES == */
/* Coordinates are the Scene Script 3D xyz tables. Solomon = origin [0,0,0].
 * Y depth layers: fortress/fleet/command≈0 · ms≈18 · hero-ms≈24 · artillery≈40. */
const SCENES = [
  { id:'S1', title:'序幕 — 要塞的沉默', hold:20, cc:['CANON'],
    narr:'奧德薩之後，吉翁全面收縮宇宙；所羅門是最後防線之一。雷比爾將軍集結艦隊，矛頭直指要塞。',
    cam:{ pos:[130,75,150], look:[0,5,0] },
    units:[
      { n:'所羅門要塞', kind:'fortress', faction:'zeon', at:[0,0,0] },
      { n:'Zeon 巡邏 MS', kind:'ms', faction:'zeon', track:[[36,18,36],[-36,18,-36],[0,18,36]] },
      { n:'聯邦偵察機', kind:'ms', faction:'eff', track:[[132,18,132],[-144,18,-132]] },
    ] },
  { id:'S2', title:'聯邦集結', hold:18, cc:['CANON','VARIANT'],
    narr:'第一、第二聯合艦隊兩翼包抄逼近，白色基地隨隊推進；道森提督啟動所羅門防禦配置。',
    cam:{ pos:[185,80,120], look:[10,5,-10] },
    units:[
      { n:'所羅門要塞', kind:'fortress', faction:'zeon', at:[0,0,0] },

/* ====================================================== 9 · FX (pooled) ==== */
const stage = new THREE.Group(); scene.add(stage);
const fxList = [], beamList = [], trailList = [];

function disposeObj(o){
  o.traverse(n=>{
    if(n.geometry) n.geometry.dispose();
    if(n.material){ const arr = Array.isArray(n.material) ? n.material : [n.material];
      arr.forEach(m=>{ if(m.map && !m.map._shared) m.map.dispose(); m.dispose(); }); }
  });
}
function spawnExplosion(pos, faction){
  const sp = makeSprite(glowTex('boom', [[0,'rgba(255,244,210,1)'],[0.3,'rgba(255,170,80,0.85)'],[1,'rgba(255,120,40,0)']]), 5, 1);
  sp.position.copy(pos); stage.add(sp);
  fxList.push({ sp, t:0, life:1.1, max:40 });
  // debris sparks
  const sk = makeSprite(glowTex('spark', [[0,'rgba(255,230,180,1)'],[1,'rgba(255,180,90,0)']]), 2, 0.9);
  sk.position.copy(pos); stage.add(sk);
  fxList.push({ sp:sk, t:0, life:0.6, max:14 });
}
function spawnBeam(from, to){
  const dir = new THREE.Vector3().subVectors(to, from), len = dir.length();
  const geo = new THREE.CylinderGeometry(1.8, 1.8, len, 8, 1, true);
  const mat = new THREE.MeshBasicMaterial({ color:0xddf2ff, transparent:true, opacity:0,
    blending:THREE.AdditiveBlending, depthWrite:false });
  const beam = new THREE.Mesh(geo, mat);
  beam.position.copy(from).add(to).multiplyScalar(0.5);
  beam.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
  stage.add(beam); beamList.push({ beam, mat, t:0, life:1.6 });
}
function updateFx(dt){
  for(let i=fxList.length-1;i>=0;i--){ const f=fxList[i]; f.t+=dt; const k=f.t/f.life;
    if(k>=1){ stage.remove(f.sp); disposeObj(f.sp); fxList.splice(i,1); continue; }
    const s=5+k*f.max; f.sp.scale.set(s,s,1); f.sp.material.opacity=1-k; }
  for(let i=beamList.length-1;i>=0;i--){ const b=beamList[i]; b.t+=dt; const k=b.t/b.life;
    if(k>=1){ stage.remove(b.beam); disposeObj(b.beam); beamList.splice(i,1); continue; }
    b.mat.opacity=Math.sin(Math.min(k,1)*Math.PI)*0.9; }
  for(let i=trailList.length-1;i>=0;i--){ const tr=trailList[i]; tr.t+=dt; const k=tr.t/tr.life;
    if(k>=1){ stage.remove(tr.sp); trailList.splice(i,1); continue; }
    tr.sp.material.opacity=(1-k)*0.5; tr.sp.scale.setScalar(5*(1-k*0.5)); }
}

/* ================================================== 10 · SCENES PLAYER ===== */
const overlay = { act:document.getElementById('act'), cc:document.getElementById('cc'),
  ntxt:document.getElementById('ntxt'), dots:document.getElementById('dots') };
const CCMAP = { CANON:'canon', VARIANT:'variant', SUPP:'supp', STAGING:'staging' };
// progress dots
SCENES.forEach(()=>{ const i=document.createElement('i'); overlay.dots.appendChild(i); });

let si = -1, phase = 0, paused = false;
const camFrom = { pos:new THREE.Vector3(), look:new THREE.Vector3() };
const camTo   = { pos:new THREE.Vector3(), look:new THREE.Vector3() };
const curLook = new THREE.Vector3();
let liveUnits = [], sceneArrayPos = null;

function easeIO(x){ return x<0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2; }
function dur(S){ return 2.4 + S.hold; }

function clearStage(){
  for(let i=stage.children.length-1;i>=0;i--){ const c=stage.children[i]; stage.remove(c); disposeObj(c); }
  liveUnits.length=0; fxList.length=0; beamList.length=0; trailList.length=0;
}
function setOverlay(S, idx){
  overlay.act.innerHTML = `<span class="n">${S.id} / ${SCENES.length}</span>${S.title}`;
  overlay.cc.innerHTML = S.cc.map(c=>`<span class="cc ${CCMAP[c]}">${c}</span>`).join('');
  overlay.ntxt.textContent = S.narr;
  [...overlay.dots.children].forEach((d,i)=>{ d.className = i===idx ? 'on' : (i<idx?'done':''); });
}
function enterScene(idx){
  si = idx; phase = 0;
  const S = SCENES[idx];
  clearStage();
  camFrom.pos.copy(camera.position); camFrom.look.copy(curLook);
  camTo.pos.set(...S.cam.pos); camTo.look.set(...S.cam.look);
  sceneArrayPos = null;
  const D = dur(S);
  for(const u of S.units){
    const obj = buildUnit(u);
    let curve = null, start;
    if(u.track){
      const pts = u.track.map(p=>new THREE.Vector3(...p));
      start = pts[0].clone();
      if(pts.length>=2){ curve = new THREE.CatmullRomCurve3(pts); curve.curveType='catmullrom'; curve.tension=0.4; }
    } else { start = new THREE.Vector3(...u.at); }
    obj.position.copy(start);
    if(u.kind==='artillery') sceneArrayPos = start.clone();
    stage.add(obj);
    liveUnits.push({ u, obj, curve, dead:!!u.dead,
      deadAt:(u.deadDelay!=null?u.deadDelay:0.85)*D, exploded:false, captured:false });
  }
  setOverlay(S, idx);
}

function playUpdate(dt){
  if(si<0) return;
  const S = SCENES[si], D = dur(S);
  phase += dt;
  // camera tween over first 2.4s, then hold
  const e = easeIO(Math.min(1, phase/2.4));
  camera.position.lerpVectors(camFrom.pos, camTo.pos, e);
  curLook.lerpVectors(camFrom.look, camTo.look, e);
  camera.lookAt(curLook);
  const p = easeIO(Math.min(1, phase/D));
  for(const lu of liveUnits){
    if(lu.curve){ lu.curve.getPoint(p, lu.obj.position);
      // face direction of travel
      const ahead = lu.curve.getPoint(Math.min(1, p+0.02));
      if(ahead.distanceToSquared(lu.obj.position)>1e-4) lu.obj.lookAt(ahead);
    }
    // solar array charge / fire
    if(lu.u.kind==='artillery'){
      const ch = lu.obj.getObjectByName('charge');
      if(ch) ch.material.opacity = lu.u.fire ? (0.3+0.7*Math.abs(Math.sin(phase*4))) : Math.min(0.6, phase/2.4*0.6);
    }
    // hero-ms motion trail
    if(lu.u.kind==='hero-ms' && lu.obj.visible && lu.curve){
      const F = FACTION[lu.u.faction];
      const tr = makeSprite(glowTex('trail-'+F.emblem, [[0,`rgba(${F.ls},0.9)`],[1,`rgba(${F.ls},0)`]]), 5, 0.5);
      tr.position.copy(lu.obj.position); stage.add(tr); trailList.push({ sp:tr, t:0, life:0.6 });
    }
    // st:dead vaporise
    if(lu.dead && !lu.exploded && phase>=lu.deadAt){
      lu.exploded = true;
      if(sceneArrayPos) spawnBeam(sceneArrayPos.clone(), lu.obj.position.clone());
      spawnExplosion(lu.obj.position.clone(), lu.u.faction);
      lu.obj.visible = false;
    }
    // S10 emblem swap (Zeon → EFF) at mid-hold
    if(lu.u.capture && !lu.captured && phase > D*0.5){
      lu.captured = true;
      const F = FACTION.eff;
      const core = lu.obj.getObjectByName('reactorCore'); if(core) core.material.color.set(F.core);
      const glow = lu.obj.getObjectByName('coreGlow'); if(glow) lu.obj.remove(glow);
      lu.obj.add(emblemSprite(F));
    }
  }
  if(phase >= D) enterScene((si+1) % SCENES.length);
}

/* ===================================================== 11 · CONTROLS ======= */
window.addEventListener('keydown', e=>{
  if(e.key==='h'||e.key==='H') document.body.classList.toggle('bare');
  else if(e.code==='Space'){ e.preventDefault(); paused=!paused; }
  else if(e.key==='ArrowRight') enterScene((si+1)%SCENES.length);
  else if(e.key==='ArrowLeft') enterScene((si-1+SCENES.length)%SCENES.length);
});
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  starMat.uniforms.uPix.value = renderer.getPixelRatio();
});

/* ========================================================= 12 · LOOP ======= */
const clock = new THREE.Clock();
// opening: start pulled back so S1 tween eases in
camera.position.set(210, 120, 240); curLook.set(0,0,0); camera.lookAt(curLook);

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05), t = clock.elapsedTime;
  if(!paused) playUpdate(dt);
  updateFx(dt);
  earth.rotation.y += dt*0.01;
  starMat.uniforms.uTime.value = t;
  renderer.render(scene, camera);
}

// deep-link to an act via hash (#6 → S6); defaults to opening act
const startIdx = Math.max(0, Math.min(SCENES.length-1, (parseInt(location.hash.slice(1),10)||1) - 1));
window.addEventListener('hashchange', ()=>{
  const i = Math.max(0, Math.min(SCENES.length-1, (parseInt(location.hash.slice(1),10)||1) - 1));
  enterScene(i);
});

const boot = document.getElementById('boot');
requestAnimationFrame(()=>{ enterScene(startIdx); animate(); setTimeout(()=>boot.classList.add('gone'), 400); });
</script>
