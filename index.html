<meta name="author" content="Johnny Lai — https://www.linkedin.com/in/icomppower/" />

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%23000308'/><circle cx='8' cy='8' r='3' fill='%23f5c46b'/></svg>" />
<style>
  :root{
    --ink:#dfe6f0; --ink-dim:#8aa0bc; --void:#000308;
    --amber:#f5c46b; --amber-glow:rgba(245,196,107,.55);
    --blue:#86b9ff; --blue-glow:rgba(134,185,255,.55);
    --panel:rgba(8,12,20,.72); --edge:rgba(140,180,240,.22);
    --mono:"SFMono-Regular",Consolas,ui-monospace,monospace;
    --sans:"Inter","Noto Sans TC","Helvetica Neue",Arial,system-ui,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  @media (prefers-reduced-motion: reduce){ *{ animation-duration:.001ms !important; transition-duration:.001ms !important; } }
  html,body{width:100%;height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:var(--sans)}
  #scene{position:fixed;inset:0;z-index:0}

  /* overlays that `h` toggles */
  .overlay{transition:opacity .4s ease}
  body.bare .overlay{opacity:0}

  /* act title — top-left */
  #act{position:fixed;left:22px;top:20px;z-index:3;pointer-events:none;
    font:600 13px/1.4 var(--mono);letter-spacing:.16em;text-transform:uppercase;
    color:var(--amber);text-shadow:0 0 10px var(--amber-glow),0 1px 3px #000}
  #act .n{color:var(--ink-dim);font-weight:400;margin-right:8px}

  /* narration band — bottom-center */
  #narr{position:fixed;left:50%;bottom:54px;z-index:3;transform:translateX(-50%);
    width:min(820px,90vw);text-align:center;pointer-events:none}
  #cc{display:block;margin-bottom:10px;line-height:1}
  .cc{display:inline-block;padding:2px 8px;border-radius:3px;font-size:.72rem;
    font-weight:700;margin:0 3px;letter-spacing:.08em;font-family:var(--mono)}
  .cc.canon{background:#1b5e20;color:#fff;} .cc.variant{background:#e65100;color:#fff;}
  .cc.supp{background:#1a237e;color:#fff;} .cc.staging{background:#4a148c;color:#fff;}
  #ntxt{display:inline-block;font:400 15px/1.7 var(--sans);color:var(--ink);
    letter-spacing:.02em;text-shadow:0 1px 6px #000,0 0 18px rgba(0,0,0,.8);
    background:var(--panel);padding:7px 16px;border-radius:4px;
    border:1px solid var(--edge);backdrop-filter:blur(3px)}

  /* progress dots — bottom-center under narration */
  #dots{position:fixed;left:50%;bottom:30px;z-index:3;transform:translateX(-50%);
    display:flex;gap:7px;pointer-events:none}
  #dots i{width:7px;height:7px;border-radius:50%;background:rgba(140,180,240,.25);
    transition:background .4s,box-shadow .4s}
  #dots i.on{background:var(--amber);box-shadow:0 0 8px var(--amber-glow)}
  #dots i.done{background:var(--ink-dim)}

  /* control hint — top-right, hidden by `h` */
  #hint{position:fixed;right:18px;top:18px;z-index:3;font:400 11px/1.6 var(--mono);
    color:var(--ink-dim);letter-spacing:.04em;pointer-events:none;text-align:right;
    text-shadow:0 1px 3px #000}
  #hint b{color:var(--ink);font-weight:600}

  /* creator credit — REQUIRED on every deploy; stays visible when `h` is pressed */
  #credit{position:fixed;right:16px;bottom:12px;z-index:4;
    font:500 11px/1.4 var(--mono);letter-spacing:.05em;
    color:var(--ink-dim);text-shadow:0 1px 3px #000}
  #credit a{color:var(--ink);text-decoration:none;border-bottom:1px solid var(--edge);
    pointer-events:auto;transition:color .2s,border-color .2s}
  #credit a:hover{color:var(--amber);border-color:var(--amber)}

  #boot{position:fixed;inset:0;z-index:9;display:flex;align-items:center;justify-content:center;
    background:var(--void);color:var(--ink-dim);font:400 12px/1.6 var(--mono);letter-spacing:.18em;
    text-transform:uppercase;transition:opacity .6s ease}
  #boot.gone{opacity:0;pointer-events:none}
</style>

<body>
  <div id="scene"></div>

  <div id="act" class="overlay"></div>

  <div id="hint" class="overlay">
    <b>SPACE</b> 暫停／播放 &nbsp;·&nbsp; <b>← →</b> 切幕 &nbsp;·&nbsp; <b>H</b> 隱藏介面
  </div>

  <div id="narr" class="overlay"><span id="cc"></span><span id="ntxt"></span></div>

<!-- Three.js r128, single script from cdnjs (no bundler, no build step) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- r128 postprocessing addons (bloom) — attach to the global THREE, no bundler needed -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
<script>
/* ============================================================================
 * 所羅門攻略戰 · BATTLE OF SOLOMON · U.C. 0079
 * Single-file 3D space documentary — built on icomppower/space-engine.
 * ----------------------------------------------------------------------------
 * Real star sphere · nebula · sun · distant Earth/Luna backdrop · Solomon
 * asteroid fortress as scene origin [0,0,0]. A SCENES[] player auto-plays 10
 * acts: per-scene camera tween (2.4s) + hold, multi-unit keyframe tracks,
 * st:dead vaporise FX, Solar System beam, faction colours + emblems, CC chips.
 * No external assets · no build step · no 2D map · no timeline scrubber.
 * ==========================================================================*/

/* ---------------------------------------------------------------- CFG ----- */
const CFG = {
  starCount : 9000,
  starShell : [6200, 9600],
  sunDir    : [1.0, 0.34, 0.55],
  // distant backdrop (dim, never steals the frame — the battle is the subject)
  earthPos  : [-1700, -260, -2500], earthSize: 120,
  // Luna ORBITS Earth (moonPivot at Earth's centre) — not a fixed corridor point
  moonOrbit : 340, moonSize : 26, moonTilt : 0.42,
  // deep-corridor backdrops — Zeon side, the direction Zeon retreats toward in S10.
  // A Baoa Qu = the gate beyond Solomon (violet, same shape); Side 3 = deepest.
  abaoaquPos : [-560, 120, -640], abaoaquSize : 70,
  side3Pos   : [-820, 150, -980],
};

/* ----------------------------------------- factions (colour + emblem) -----
 * Locked 2026-07-01 visual language: SIDE colour (eff/zeon) marks the faction,
 * PLACE colour (solomon/abaoaqu) marks the fortress. `glow` is the emissive/
 * trail/engine tint that blooms; `hull` is the matte body.                    */
const FACTION = {
  eff:  { hull:0x8c98a8, light:0x9fd0ff, core:0x9fd0ff, glow:0x9fd0ff, emblem:'EFF'  }, // 聯邦 — 冷藍鋼／藍光
  zeon: { hull:0x6b6258, light:0xffb63c, core:0xffc861, glow:0x7dffa0, emblem:'ZEON' }, // 吉翁 — 綠光
  solomon: { hull:0x9a7a4a, glow:0xffcf6a },   // place colour — 琥珀 amber
  abaoaqu: { hull:0x6a5a9a, glow:0xb59aff },   // place colour — 紫 violet
};
function rgbStr(hex){ const c=new THREE.Color(hex); return `${(c.r*255)|0},${(c.g*255)|0},${(c.b*255)|0}`; }
for(const k in FACTION){ const F=FACTION[k]; F.gs = rgbStr(F.glow);
  if(F.light!=null) F.ls = rgbStr(F.light); if(F.hull!=null) F.hs = rgbStr(F.hull); }

/* --------------------------------------------------------- tiny utils ----- */
function mulberry32(seed){
  let a = seed >>> 0;
  return function(){
    a |= 0; a = (a + 0x6D2B79F5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}
// radial-gradient sprite from a fresh canvas (one-offs: sun, nebula, fortress core)
function radialSprite(stops, size, opacity){
  const c = document.createElement('canvas'); c.width = c.height = 256;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(128,128,0, 128,128,128);
  stops.forEach(([o, col]) => g.addColorStop(o, col));
  ctx.fillStyle = g; ctx.fillRect(0,0,256,256);
  const tex = new THREE.CanvasTexture(c);
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity,
    blending: THREE.AdditiveBlending, depthWrite: false });
  const sp = new THREE.Sprite(mat); sp.scale.set(size, size, 1);
  return sp;
}
// cached radial textures (re-used every frame for trails / explosions / engine glow)
const _texCache = {};
function glowTex(key, stops){
  if(_texCache[key]) return _texCache[key];
  const c = document.createElement('canvas'); c.width = c.height = 128;
  const ctx = c.getContext('2d');
  const g = ctx.createRadialGradient(64,64,0, 64,64,64);
  stops.forEach(([o,col]) => g.addColorStop(o,col));
  ctx.fillStyle = g; ctx.fillRect(0,0,128,128);
  const tex = new THREE.CanvasTexture(c); tex._shared = true; _texCache[key] = tex;
  return tex;
}
function makeSprite(tex, size, opacity){
  const mat = new THREE.SpriteMaterial({ map: tex, transparent: true, opacity,
    blending: THREE.AdditiveBlending, depthWrite: false });
  const sp = new THREE.Sprite(mat); sp.scale.set(size, size, 1);
  return sp;
}

/* ========================================================== 1 · RENDERER == */
const sceneEl = document.getElementById('scene');
const scene   = new THREE.Scene();
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setClearColor(0x000308, 1);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
sceneEl.appendChild(renderer.domElement);

const camera = new THREE.PerspectiveCamera(46, window.innerWidth/window.innerHeight, 1, 40000);
const sunDir = new THREE.Vector3(...CFG.sunDir).normalize();

/* bloom pipeline — low threshold so only emissive/basic surfaces glow, matte
 * standard-material hulls stay dark. Ported from the space-engine schematic. */
const composer = new THREE.EffectComposer(renderer);
composer.addPass(new THREE.RenderPass(scene, camera));
const bloomPass = new THREE.UnrealBloomPass(
  new THREE.Vector2(window.innerWidth, window.innerHeight), 0.9, 0.5, 0.45);
composer.addPass(bloomPass);

/* ========================================================= 2 · STAR FIELD = */
function buildStars(){
  const n = CFG.starCount, [inner, outer] = CFG.starShell;
  const pos=new Float32Array(n*3), col=new Float32Array(n*3),
        size=new Float32Array(n), phase=new Float32Array(n);
  const rnd = mulberry32(90791), c = new THREE.Color();
  for(let i=0;i<n;i++){
    const u = rnd()*2-1, th = rnd()*Math.PI*2, s = Math.sqrt(1-u*u);
    const r = inner + rnd()*(outer-inner);
    pos[i*3]=r*s*Math.cos(th); pos[i*3+1]=r*u; pos[i*3+2]=r*s*Math.sin(th);
    const t = rnd();
    const hue = t<0.12 ? 0.58 : (t>0.90 ? 0.07 : 0.6);
    const sat = t<0.12||t>0.90 ? 0.5 : 0.06;
    c.setHSL(hue, sat, 0.55 + rnd()*0.45);
    col[i*3]=c.r; col[i*3+1]=c.g; col[i*3+2]=c.b;
    size[i]=(rnd()*rnd())*7+1.4; phase[i]=rnd();
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col,3));
  geo.setAttribute('aSize',    new THREE.BufferAttribute(size,1));
  geo.setAttribute('aPhase',   new THREE.BufferAttribute(phase,1));
  const mat = new THREE.ShaderMaterial({
    uniforms:{ uTime:{value:0}, uPix:{value:renderer.getPixelRatio()} },
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending, vertexColors:true,
    vertexShader:`attribute float aSize; attribute float aPhase; varying vec3 vColor;
      uniform float uTime; uniform float uPix;
      void main(){ vColor=color;
        float tw=0.65+0.35*sin(uTime*1.7+aPhase*6.2831853);
        vec4 mv=modelViewMatrix*vec4(position,1.0);
        gl_PointSize=aSize*tw*uPix*(340.0/-mv.z);
        gl_Position=projectionMatrix*mv; }`,
    fragmentShader:`varying vec3 vColor;
      void main(){ float d=length(gl_PointCoord-vec2(0.5));
        float a=smoothstep(0.5,0.0,d); gl_FragColor=vec4(vColor,a*a); }`,
  });
  const stars = new THREE.Points(geo, mat); stars.frustumCulled = false;
  scene.add(stars); return mat;
}
const starMat = buildStars();

/* ============================================================ 3 · NEBULA == */
(function(){
  const neb = new THREE.Group();
  [ { col:'rgba(60,90,200,',  pos:[-1800,600,-3200], size:5200, op:0.10 },
    { col:'rgba(170,60,150,', pos:[2400,-900,-2600], size:4200, op:0.08 },
    { col:'rgba(40,140,170,', pos:[-800,-1400,2800], size:4600, op:0.07 },
  ].forEach(c=>{ const sp=radialSprite([[0,c.col+'1)'],[0.5,c.col+'0.25)'],[1,c.col+'0)']],c.size,c.op);
    sp.position.set(...c.pos); neb.add(sp); });
  scene.add(neb);
})();

/* =============================================================== 4 · SUN == */
const sunLight = new THREE.DirectionalLight(0xfff2dd, 2.2);
sunLight.position.copy(sunDir).multiplyScalar(4000); scene.add(sunLight);
scene.add(new THREE.AmbientLight(0x1a2634, 0.42));   // low fill so v2 hull terminator reads under bloom
(function(){
  const g = new THREE.Group(); g.position.copy(sunDir.clone().multiplyScalar(7000));
  g.add(new THREE.Mesh(new THREE.SphereGeometry(120,24,24), new THREE.MeshBasicMaterial({color:0xfff6e6})));
  g.add(radialSprite([[0,'rgba(255,250,235,1)'],[0.25,'rgba(255,225,160,0.7)'],[1,'rgba(255,180,90,0)']],2600,0.9));
  scene.add(g);
})();

/* ============================================ 5 · distant Earth / Luna =====
 * buildEarth: matte (roughness 1.0) blue backdrop + a thin high-power Fresnel
 * atmosphere. Matte on purpose — a shiny Earth blooms into a "flashlight"
 * artifact under UnrealBloomPass. Ported from the space-engine schematic.     */
function earthTexture(seed){
  const W=1024,H=512,c=document.createElement('canvas'); c.width=W;c.height=H;
  const ctx=c.getContext('2d'), rnd=mulberry32(seed);
  const og=ctx.createLinearGradient(0,0,0,H);
  og.addColorStop(0,'#0a2742'); og.addColorStop(0.5,'#0e3a63'); og.addColorStop(1,'#0a2540');
  ctx.fillStyle=og; ctx.fillRect(0,0,W,H);
  const land=['#3c6b40','#4f7a45','#6e7a48','#8a7a52'];
  const centers=[[170,210],[300,300],[510,180],[600,330],[760,250],[880,160],[120,360]];
  ctx.save();
  for(const [cx,cy] of centers){
    const col=land[(rnd()*land.length)|0];
    ctx.fillStyle=col; ctx.shadowColor=col; ctx.shadowBlur=22;
    const blobs=10+(rnd()*10|0);
    for(let b=0;b<blobs;b++){
      const r=14+rnd()*38, x=cx+(rnd()-0.5)*140, y=cy+(rnd()-0.5)*90;
      ctx.beginPath(); ctx.ellipse(x,y,r,r*(0.7+rnd()*0.5),rnd()*6.28,0,6.28); ctx.fill();
    }
  }
  ctx.restore();
  ctx.save(); ctx.fillStyle='#c8d8e8'; ctx.shadowColor='#c8d8e8'; ctx.shadowBlur=24;
  for(let x=-40;x<W+40;x+=70){
    ctx.beginPath(); ctx.ellipse(x,4,55,20,0,0,6.28); ctx.fill();
    ctx.beginPath(); ctx.ellipse(x,H-4,55,20,0,0,6.28); ctx.fill();
  }
  ctx.restore();
  return new THREE.CanvasTexture(c);
}
function buildEarth(size){
  const grp = new THREE.Group();
  grp.add(new THREE.Mesh(new THREE.SphereGeometry(size,64,48),
    new THREE.MeshStandardMaterial({ map:earthTexture(1337), roughness:1.0, metalness:0.0 })));
  grp.add(new THREE.Mesh(new THREE.SphereGeometry(size*1.015,64,48), new THREE.ShaderMaterial({
    side:THREE.BackSide, blending:THREE.AdditiveBlending, transparent:true, depthWrite:false,
    uniforms:{ uColor:{ value:new THREE.Color(0x6fb0ff) } },
    vertexShader:`varying vec3 vN; varying vec3 vP;
      void main(){ vN=normalize(normalMatrix*normal);
        vP=normalize((modelViewMatrix*vec4(position,1.0)).xyz);
        gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0);}`,
    fragmentShader:`varying vec3 vN; varying vec3 vP; uniform vec3 uColor;
      void main(){ float f=pow(1.0-abs(dot(vN,vP)),28.0); gl_FragColor=vec4(uColor,f*0.35); }`,
  })));
  return grp;
}
const earth = buildEarth(CFG.earthSize);
earth.position.set(...CFG.earthPos); scene.add(earth);

// Luna — orbits Earth on a tilted pivot at Earth's centre (a moving body).
function moonTexture(seed){
  const W=512,H=256,c=document.createElement('canvas'); c.width=W;c.height=H;
  const ctx=c.getContext('2d'), rnd=mulberry32(seed);
  ctx.fillStyle='#9a9a93'; ctx.fillRect(0,0,W,H);
  for(let i=0;i<70;i++){
    const x=rnd()*W, y=rnd()*H, r=4+rnd()*30, dark=rnd()<0.4, base=dark?110:150;
    const g=ctx.createRadialGradient(x,y,0,x,y,r);
    g.addColorStop(0,`rgb(${base-30},${base-30},${base-34})`);
    g.addColorStop(0.8,`rgb(${base},${base},${base-6})`); g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,Math.PI*2); ctx.fill();
  }
  return new THREE.CanvasTexture(c);
}
const moonPivot = new THREE.Object3D();
moonPivot.position.set(...CFG.earthPos); moonPivot.rotation.x = CFG.moonTilt; scene.add(moonPivot);
const luna = new THREE.Mesh(new THREE.SphereGeometry(CFG.moonSize,48,36),
  new THREE.MeshPhongMaterial({ map:moonTexture(424242), shininess:2 }));
luna.position.set(CFG.moonOrbit, 0, 0); moonPivot.add(luna);

// Side 3 — Zeon homeland, deepest along the corridor. A faint dot cluster.
const side3 = new THREE.Group(); side3.position.set(...CFG.side3Pos);
(function(){
  const rnd = mulberry32(311);
  const colonyMat = new THREE.MeshStandardMaterial({ color:0xc8ccd6, roughness:0.35, metalness:0.7 });
  for(let i=0;i<12;i++){
    const len=10+rnd()*18, rad=1.6+rnd()*3;
    const m=new THREE.Mesh(new THREE.CylinderGeometry(rad,rad,len,12), colonyMat);
    m.position.set((rnd()-0.5)*180,(rnd()-0.5)*110,(rnd()-0.5)*180);
    m.rotation.set(rnd()*Math.PI,rnd()*Math.PI,rnd()*Math.PI); side3.add(m);
  }
  const np=70, sp=new Float32Array(np*3);
  for(let i=0;i<np;i++){ sp[i*3]=(rnd()-0.5)*230; sp[i*3+1]=(rnd()-0.5)*140; sp[i*3+2]=(rnd()-0.5)*230; }
  const sg=new THREE.BufferGeometry(); sg.setAttribute('position', new THREE.BufferAttribute(sp,3));
  side3.add(new THREE.Points(sg, new THREE.PointsMaterial({ color:0x9fc4ff, size:2.4,
    transparent:true, opacity:0.8, blending:THREE.AdditiveBlending, depthWrite:false })));
})();
scene.add(side3);

/* ============================================== 6 · buildFortress() factory ==
 * v2 Death-Star-style: panel-textured sphere hull (matte MeshStandard, stays
 * dark under bloom) + equatorial trench (dark torus + thin emissive strip) +
 * offset superlaser-style dish. Solomon and A Baoa Qu share this shape and
 * differ ONLY by place colour (amber vs violet). Lit elements are MeshBasic so
 * UnrealBloomPass blooms the glow, never the hull.
 * Tagged nodes 'trenchGlow' + 'reactorCore' let S10 swap Zeon→EFF on capture. */
function panelTexture(hullHex){
  const w=512,h=256,c=document.createElement('canvas'); c.width=w;c.height=h;
  const ctx=c.getContext('2d'), hull=new THREE.Color(hullHex);
  ctx.fillStyle=`rgb(${(hull.r*90)|0},${(hull.g*90)|0},${(hull.b*90)|0})`; ctx.fillRect(0,0,w,h);
  ctx.strokeStyle='rgba(0,0,0,0.4)';
  for(let x=0;x<w;x+=20){ ctx.beginPath(); ctx.moveTo(x,0); ctx.lineTo(x,h); ctx.stroke(); }
  for(let y=0;y<h;y+=20){ ctx.beginPath(); ctx.moveTo(0,y); ctx.lineTo(w,y); ctx.stroke(); }
  const t=new THREE.CanvasTexture(c); t.wrapS=t.wrapT=THREE.RepeatWrapping; return t;
}
function buildFortress({ size=40, place='solomon' }){
  const F = FACTION[place], glow = F.glow, grp = new THREE.Group();
  const hullMat = new THREE.MeshStandardMaterial({ map:panelTexture(F.hull), color:0xffffff, roughness:0.85, metalness:0.2 });
  grp.add(new THREE.Mesh(new THREE.SphereGeometry(size,72,54), hullMat));
  const trench = new THREE.Mesh(new THREE.TorusGeometry(size*1.001, size*0.045, 8, 96),

  const body = new THREE.Mesh(new THREE.CylinderGeometry(1.3,1.8,9,8), mat);

/* Solar System — canon-corrected reflector array (flat white panels, NO barrel/

function buildSolarSystemFlat(size, hex){
  const grp = new THREE.Group();

/* motion trail — fading ring-buffer line behind a moving unit (additive, blooms) */
function makeTrail(color, length){
  const N = length, positions = new Float32Array(N*3), alphas = new Float32Array(N);
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions,3));
  geo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas,1));
  const mat = new THREE.ShaderMaterial({
    uniforms:{ uColor:{ value:new THREE.Color(color) } },
    vertexShader:`attribute float aAlpha; varying float vA;
      void main(){ vA=aAlpha; gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }`,
    fragmentShader:`varying float vA; uniform vec3 uColor;
      void main(){ gl_FragColor=vec4(uColor, vA); }`,
    transparent:true, depthWrite:false, blending:THREE.AdditiveBlending });
  const line = new THREE.Line(geo, mat); line.frustumCulled = false;
  const pts = [];
  return { line, push(v){
    pts.push(v.clone()); if(pts.length>N) pts.shift();
    for(let i=0;i<N;i++){ const p = pts[i] || pts[0] || v;
      positions[i*3]=p.x; positions[i*3+1]=p.y; positions[i*3+2]=p.z;
      alphas[i] = pts[i] ? (i/(N-1))*0.85 : 0; }
    geo.attributes.position.needsUpdate = true; geo.attributes.aAlpha.needsUpdate = true;
  } };
}
/* permanent path-so-far — dashed "plotted course" of the WHOLE track, revealed
 * progressively via setDrawRange, plus waypoint pins dropped along the way.    */
function makePathSoFar(curve, color, samples){
  samples = samples || 120;
  const pos = new Float32Array(samples*3);
  curve.getSpacedPoints(samples-1).forEach((p,i)=>{ pos[i*3]=p.x; pos[i*3+1]=p.y; pos[i*3+2]=p.z; });
  const geo = new THREE.BufferGeometry(); geo.setAttribute('position', new THREE.BufferAttribute(pos,3));
  geo.setDrawRange(0,0);
  const line = new THREE.Line(geo, new THREE.LineDashedMaterial({
    color, dashSize:6, gapSize:4, transparent:true, opacity:0.5 }));
  line.computeLineDistances(); line.frustumCulled = false;
  const markers = new THREE.Group();
  return { line, markers, samples, color, lastMarkerP:-1 };
}

const stage = new THREE.Group(); scene.add(stage);
const fxList = [], beamList = [], trailList = [];

function disposeObj(o){
  o.traverse(n=>{
    if(n.geometry) n.geometry.dispose();
    if(n.material){ const arr = Array.isArray(n.material) ? n.material : [n.material];
      arr.forEach(m=>{ if(m.map && !m.map._shared) m.map.dispose(); m.dispose(); }); }
  });
}
function spawnExplosion(pos, faction){
  const sp = makeSprite(glowTex('boom', [[0,'rgba(255,244,210,1)'],[0.3,'rgba(255,170,80,0.85)'],[1,'rgba(255,120,40,0)']]), 5, 1);
  sp.position.copy(pos); stage.add(sp);
  fxList.push({ sp, t:0, life:1.1, max:40 });
  // debris sparks
  const sk = makeSprite(glowTex('spark', [[0,'rgba(255,230,180,1)'],[1,'rgba(255,180,90,0)']]), 2, 0.9);
  sk.position.copy(pos); stage.add(sk);
  fxList.push({ sp:sk, t:0, life:0.6, max:14 });
}
function spawnBeam(from, to){
  const dir = new THREE.Vector3().subVectors(to, from), len = dir.length();
  const geo = new THREE.CylinderGeometry(1.8, 1.8, len, 8, 1, true);
  const mat = new THREE.MeshBasicMaterial({ color:0xddf2ff, transparent:true, opacity:0,
    blending:THREE.AdditiveBlending, depthWrite:false });
  const beam = new THREE.Mesh(geo, mat);
  beam.position.copy(from).add(to).multiplyScalar(0.5);
  beam.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), dir.clone().normalize());
  stage.add(beam); beamList.push({ beam, mat, t:0, life:1.6 });
}
function updateFx(dt){
  for(let i=fxList.length-1;i>=0;i--){ const f=fxList[i]; f.t+=dt; const k=f.t/f.life;
    if(k>=1){ stage.remove(f.sp); disposeObj(f.sp); fxList.splice(i,1); continue; }
    const s=5+k*f.max; f.sp.scale.set(s,s,1); f.sp.material.opacity=1-k; }
  for(let i=beamList.length-1;i>=0;i--){ const b=beamList[i]; b.t+=dt; const k=b.t/b.life;
    if(k>=1){ stage.remove(b.beam); disposeObj(b.beam); beamList.splice(i,1); continue; }
    b.mat.opacity=Math.sin(Math.min(k,1)*Math.PI)*0.9; }
  for(let i=trailList.length-1;i>=0;i--){ const tr=trailList[i]; tr.t+=dt; const k=tr.t/tr.life;
    if(k>=1){ stage.remove(tr.sp); trailList.splice(i,1); continue; }
    tr.sp.material.opacity=(1-k)*0.5; tr.sp.scale.setScalar(5*(1-k*0.5)); }
}

/* ================================================== 10 · SCENES PLAYER ===== */
const overlay = { act:document.getElementById('act'), cc:document.getElementById('cc'),
  ntxt:document.getElementById('ntxt'), dots:document.getElementById('dots') };
const CCMAP = { CANON:'canon', VARIANT:'variant', SUPP:'supp', STAGING:'staging' };
// progress dots
SCENES.forEach(()=>{ const i=document.createElement('i'); overlay.dots.appendChild(i); });

let si = -1, phase = 0, paused = false;
const camFrom = { pos:new THREE.Vector3(), look:new THREE.Vector3() };
const camTo   = { pos:new THREE.Vector3(), look:new THREE.Vector3() };
const curLook = new THREE.Vector3();
let liveUnits = [], sceneArrayPos = null;

function easeIO(x){ return x<0.5 ? 2*x*x : 1-Math.pow(-2*x+2,2)/2; }
function dur(S){ return 2.4 + S.hold; }

function clearStage(){
  for(let i=stage.children.length-1;i>=0;i--){ const c=stage.children[i]; stage.remove(c); disposeObj(c); }
  liveUnits.length=0; fxList.length=0; beamList.length=0; trailList.length=0;
}
function setOverlay(S, idx){
  overlay.act.innerHTML = `<span class="n">${S.id} / ${SCENES.length}</span>${S.title}`;
  overlay.cc.innerHTML = S.cc.map(c=>`<span class="cc ${CCMAP[c]}">${c}</span>`).join('');
  overlay.ntxt.textContent = S.narr;
  [...overlay.dots.children].forEach((d,i)=>{ d.className = i===idx ? 'on' : (i<idx?'done':''); });
}
function enterScene(idx){
  si = idx; phase = 0;
  const S = SCENES[idx];
  clearStage();
  camFrom.pos.copy(camera.position); camFrom.look.copy(curLook);
  camTo.pos.set(...S.cam.pos); camTo.look.set(...S.cam.look);
  sceneArrayPos = null;
  const D = dur(S);
  for(const u of S.units){
    const obj = buildUnit(u);
    let curve = null, start;
    if(u.track){
      const pts = u.track.map(p=>new THREE.Vector3(...p));
      start = pts[0].clone();
      if(pts.length>=2){ curve = new THREE.CatmullRomCurve3(pts); curve.curveType='catmullrom'; curve.tension=0.4; }
    } else { start = new THREE.Vector3(...u.at); }
    obj.position.copy(start);
    if(u.kind==='artillery'){ sceneArrayPos = start.clone(); obj.lookAt(0,10,0); } // aim the reflector at the battle
    stage.add(obj);
    const lu = { u, obj, curve, dead:!!u.dead,
      deadAt:(u.deadDelay!=null?u.deadDelay:0.85)*D, exploded:false, captured:false };
    // motion trail + permanent path-so-far for moving units (two-layer read:
    // glowing trail = "where it is now", dashed path = "the whole route").
    if(curve){
      const gc = FACTION[u.faction].glow;
      if(TRAIL_KINDS.has(u.kind)){ lu.trail = makeTrail(gc, 44); stage.add(lu.trail.line); }
      if(PATH_KINDS.has(u.kind)){ lu.path = makePathSoFar(curve, gc);
        stage.add(lu.path.line); stage.add(lu.path.markers); }
    }
    liveUnits.push(lu);
  }
  setOverlay(S, idx);
}

function playUpdate(dt){
  if(si<0) return;
  const S = SCENES[si], D = dur(S);
  phase += dt;
  // camera tween over first 2.4s, then hold
  const e = easeIO(Math.min(1, phase/2.4));
  camera.position.lerpVectors(camFrom.pos, camTo.pos, e);
  curLook.lerpVectors(camFrom.look, camTo.look, e);
  camera.lookAt(curLook);
  const p = easeIO(Math.min(1, phase/D));
  for(const lu of liveUnits){
    if(lu.curve){ lu.curve.getPoint(p, lu.obj.position);
      // face direction of travel
      const ahead = lu.curve.getPoint(Math.min(1, p+0.02));
      if(ahead.distanceToSquared(lu.obj.position)>1e-4) lu.obj.lookAt(ahead);
    }
    // solar array charge / fire
    if(lu.u.kind==='artillery'){
      const ch = lu.obj.getObjectByName('charge');
      if(ch) ch.material.opacity = lu.u.fire ? (0.3+0.7*Math.abs(Math.sin(phase*4))) : Math.min(0.6, phase/2.4*0.6);
    }
    // glowing motion trail + dashed path-so-far (revealed as the unit advances)
    if(lu.trail && lu.obj.visible) lu.trail.push(lu.obj.position);
    if(lu.path){
      lu.path.line.geometry.setDrawRange(0, Math.max(2, Math.floor(p*lu.path.samples)));
      if(p - lu.path.lastMarkerP > 0.12){
        lu.path.lastMarkerP = p;
        const pin = new THREE.Mesh(new THREE.SphereGeometry(1.6,8,8),
          new THREE.MeshBasicMaterial({ color:lu.path.color, transparent:true, opacity:0.7 }));
        pin.position.copy(lu.obj.position); lu.path.markers.add(pin);
      }
    }
    // st:dead vaporise
    if(lu.dead && !lu.exploded && phase>=lu.deadAt){
      lu.exploded = true;
      if(sceneArrayPos) spawnBeam(sceneArrayPos.clone(), lu.obj.position.clone());
      spawnExplosion(lu.obj.position.clone(), lu.u.faction);
      lu.obj.visible = false;
    }
    // S10 capture — Solomon changes hands: trench + dish glow turn EFF-blue,
    // Federation emblem raised (renamed コンペイトウ in the narration).
    if(lu.u.capture && !lu.captured && phase > D*0.5){
      lu.captured = true;
      const eff = FACTION.eff.glow;
      const tg = lu.obj.getObjectByName('trenchGlow'); if(tg) tg.material.color.set(eff);
      const rc = lu.obj.getObjectByName('reactorCore'); if(rc) rc.material.color.set(eff);
      const em = emblemSprite(FACTION.eff);     // float above the solid hull so it reads
      em.position.set(0, 56, 0); em.scale.set(20,20,1); lu.obj.add(em);
    }
  }
  if(phase >= D) enterScene((si+1) % SCENES.length);
}

/* ===================================================== 11 · CONTROLS ======= */
window.addEventListener('keydown', e=>{
  if(e.key==='h'||e.key==='H') document.body.classList.toggle('bare');
  else if(e.code==='Space'){ e.preventDefault(); paused=!paused; }
  else if(e.key==='ArrowRight') enterScene((si+1)%SCENES.length);
  else if(e.key==='ArrowLeft') enterScene((si-1+SCENES.length)%SCENES.length);
});
window.addEventListener('resize', ()=>{
  camera.aspect = window.innerWidth/window.innerHeight; camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  composer.setSize(window.innerWidth, window.innerHeight);
  starMat.uniforms.uPix.value = renderer.getPixelRatio();
});

/* ========================================================= 12 · LOOP ======= */
const clock = new THREE.Clock();
// opening: start pulled back so S1 tween eases in
camera.position.set(210, 120, 240); curLook.set(0,0,0); camera.lookAt(curLook);

function animate(){
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05), t = clock.elapsedTime;
  if(!paused) playUpdate(dt);
  updateFx(dt);
  // backdrop motion — Earth spins, Luna orbits it, the fortresses idle-rotate
  earth.rotation.y   += dt*0.01;
  moonPivot.rotation.y += dt*0.05;   // Luna's orbit around Earth
  luna.rotation.y    += dt*0.02;
  abaoaqu.rotation.y += dt*0.03;
  side3.rotation.y   += dt*0.008;
  starMat.uniforms.uTime.value = t;
  composer.render();                 // bloom pipeline replaces renderer.render()
}

// deep-link to an act via hash (#6 → S6); defaults to opening act
const startIdx = Math.max(0, Math.min(SCENES.length-1, (parseInt(location.hash.slice(1),10)||1) - 1));
window.addEventListener('hashchange', ()=>{
  const i = Math.max(0, Math.min(SCENES.length-1, (parseInt(location.hash.slice(1),10)||1) - 1));
  enterScene(i);
});

const boot = document.getElementById('boot');
requestAnimationFrame(()=>{ enterScene(startIdx); animate(); setTimeout(()=>boot.classList.add('gone'), 400); });
</script>
</body>
